<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ikamva Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body data-page="admin-dashboard">
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">IK</div>
          <div class="brand-text">
            <div class="brand-title">Ikamva Virtual Admin Assist</div>
            <div class="brand-subtitle">Admin Dashboard</div>
          </div>
        </div>
        <nav class="nav-actions" aria-label="Dashboard navigation">
          <a class="button secondary" href="dashboard.html">Client</a>
        </nav>
      </header>

      <main class="page">
        <section class="page-header">
          <div class="page-title">
            <h1>AI Review Queue</h1>
            <p class="muted">Review approved-by-supervisor drafts before production delivery.</p>
          </div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <h2>Needs Review</h2>
            <span class="status-pill status-needs_review">Manual Approval</span>
          </div>
          <div class="review-list" data-review-list></div>
        </section>
      </main>
    </div>
  </body>
</html>
